<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confessional Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #333;
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 1000px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 2rem;
      align-items: start;
    }

    .left-panel {
      text-align: left;
    }

    h1 {
      margin-top: 0;
      color: #111;
    }

    p {
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .help-link {
      display: inline-block;
      margin-top: 1rem;
      color: #0d6efd;
    }

    .embed-frame {
      width: 100%;
      max-width: 600px;
      height: 290px;
      border: 0;
      border-radius: 8px;
    }

    @media (max-width: 800px) {
      .container {
        grid-template-columns: 1fr;
      }

      .left-panel {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <h1>Hello World</h1>
      <p>Upload your confessional video through the embedded uploader on the right.</p>
      <a class="help-link" href="advice.html">Advice for making good confessional videos</a>
    </div>

    <iframe class="embed-frame" src="https://driveuploader.com/upload/rD9e4qKCDU/embed/"></iframe>
  </div>
</body>
</html>
